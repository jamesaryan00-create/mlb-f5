name: Scrape OddsShark
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/scrape-oddsshark.js
      - run: |
          git config user.email "bot@github.com"
          git config user.name "Bot"
          git add public/oddsshark-data.json
          git commit -m "Update OddsShark data" || true
          git push
